<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFS Product Wall Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .a1-poster {
            width: 100%;
            max-width: 594mm;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            margin: 0 auto;
        }

        .header-section {
            position: relative;
            background-color: #1a103c;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            z-index: 10;
        }

        .header-wave {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 5;
        }

        .content-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 40px 20px 20px 20px;
            z-index: 1;
        }

        .product-card {
            border: 3px solid #e5e7eb;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            text-align: center;
            border-top: 2px solid #e5e7eb;
            padding-top: 12px;
        }

        .footer-section {
            background-color: #1a103c;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            text-align: center;
            margin-top: auto;
        }

        .qr-code img {
            width: 100px;
            height: auto;
            margin: 10px 0;
        }

        .safs-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .safs-subtitle {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        .safs-slogan {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #8a7a3b;
        }

        /* Responsive Breakpoints for Grid & Print */
        @media (min-width: 640px) {
            .content-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1024px), print {
            .a1-poster {
                width: 594mm;
                min-height: 841mm;
            }
            .header-section { padding: 3rem 0; }
            .content-grid {
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(6, 1fr);
                gap: 15mm 15mm;
                padding: 35mm 20mm 20mm 20mm;
            }
            
            /* Enlarge product elements for A1 size */
            .product-image {
                height: 260px;
                margin-bottom: 15px;
            }
            .product-title {
                font-size: 28px;
                padding-top: 15px;
            }

            .footer-section {
                flex-direction: row;
                justify-content: space-between;
                padding: 30mm;
                font-size: 24px;
                text-align: left;
            }
            .qr-code img {
                width: 200px;
            }
            .safs-title { font-size: 64px; letter-spacing: 6px; }
            .safs-subtitle { font-size: 32px; letter-spacing: 14px; }
            .safs-slogan { font-size: 22px; letter-spacing: 3px; }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .a1-poster {
                box-shadow: none;
                width: 100%;
                height: 100vh;
            }
            @page {
                size: A1 portrait;
                margin: 0;
            }
        }
    </style>
</head>
